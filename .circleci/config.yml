version: 2.1
jobs:
  build:
    docker:
      - image: cimg/base:current
      - image: docker:dind
        command: ["--tlsverify=false"]
        # user: root
        # entrypoint : ["dockerd-entrypoint.sh --tlsverify=false"]
        # entrypoint: ["dockerd-entrypoint.sh --tlsverify=false"]
      
      
    resource_class: vieer-rubrik/tester
    steps:
      - run: ls /var/run
      - run: |
          DOCKER_URL=https://download.docker.com/linux/static/stable/x86_64
          DOCKER_VERSION=27.3.1
          sudo mkdir -p /usr/local/bin
          curl -fsSL $DOCKER_URL/docker-$DOCKER_VERSION.tgz | \
          sudo tar zxvf - --strip-components=1 -C /usr/local/bin docker/docker

      - run: |
          docker ps

workflows:
  build-workflow:
    jobs:
      - build
